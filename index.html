<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<script>
(function(){
  function sha256(s){
    function rr(n,x){return(n>>>x)|(n<<(32-x));}
    var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
    var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
    var b=[];for(var i=0;i<s.length;i++){var c=s.charCodeAt(i);if(c<128)b.push(c);else if(c<2048){b.push(192|(c>>6));b.push(128|(c&63));}else{b.push(224|(c>>12));b.push(128|((c>>6)&63));b.push(128|(c&63));}}
    var l=b.length*8;b.push(0x80);while(b.length%64!==56)b.push(0);
    b.push(0,0,0,0);b.push((l>>>24)&0xff,(l>>>16)&0xff,(l>>>8)&0xff,l&0xff);
    for(var o=0;o<b.length;o+=64){
      var w=[];for(var t=0;t<16;t++)w[t]=(b[o+t*4]<<24)|(b[o+t*4+1]<<16)|(b[o+t*4+2]<<8)|b[o+t*4+3];
      for(t=16;t<64;t++){var s0=rr(w[t-15],7)^rr(w[t-15],18)^(w[t-15]>>>3);var s1=rr(w[t-2],17)^rr(w[t-2],19)^(w[t-2]>>>10);w[t]=(w[t-16]+s0+w[t-7]+s1)|0;}
      var a=H[0],bb=H[1],cc=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
      for(t=0;t<64;t++){var S1=rr(e,6)^rr(e,11)^rr(e,25);var ch=(e&f)^((~e)&g);var temp1=(h+S1+ch+K[t]+w[t])|0;var S0=rr(a,2)^rr(a,13)^rr(a,22);var maj=(a&bb)^(a&cc)^(bb&cc);var temp2=(S0+maj)|0;h=g;g=f;f=e;e=(d+temp1)|0;d=cc;cc=bb;bb=a;a=(temp1+temp2)|0;}
      H[0]=(H[0]+a)|0;H[1]=(H[1]+bb)|0;H[2]=(H[2]+cc)|0;H[3]=(H[3]+d)|0;H[4]=(H[4]+e)|0;H[5]=(H[5]+f)|0;H[6]=(H[6]+g)|0;H[7]=(H[7]+h)|0;
    }
    return H.map(function(v){return('00000000'+((v<0?v+4294967296:v).toString(16))).slice(-8);}).join('');
  }

  var ph='d6a69166d21ee0c8a97327cb142adee2201749599f194a27453fc23edc0cde07';
  

  document.addEventListener('DOMContentLoaded',function(){
    Array.from(document.body.children).forEach(function(el){el.style.display='none';el.setAttribute('data-hidden','1');});
    
    var overlay=document.createElement('div');
    overlay.id='lockOverlay';
    overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0b;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:Inter,-apple-system,sans-serif;-webkit-user-select:none;user-select:none;';

    var d=document.createElement('div');
    d.style.cssText='text-align:center;';

    var selectedDots = [];
    var isDrawing = false;
    var dotElements = [];
    var lineCanvas = null;
    var ctx = null;
    var gridSize = 240;
    var dotRadius = 14;
    var dotSpacing = gridSize / 3;
    var dotOffset = dotSpacing / 2;

    d.innerHTML='<div style="font-size:48px;margin-bottom:24px">⚡</div>'+
      '<h1 style="color:#ededef;font-size:22px;margin-bottom:28px;font-weight:600">Nik Sharma</h1>'+
      '<div id="pattern-container" style="position:relative;width:'+gridSize+'px;height:'+gridSize+'px;margin:0 auto;touch-action:none;"></div>'+
      '<p style="color:#5c5c63;font-size:12px;margin-top:16px;">Draw pattern to unlock</p>'+
      '<p id="err" style="color:#ef4444;font-size:13px;margin-top:8px;opacity:0;transition:opacity 0.2s">Wrong pattern</p>';

    overlay.appendChild(d);
    document.body.appendChild(overlay);

    var container = document.getElementById('pattern-container');
    var err = document.getElementById('err');

    lineCanvas = document.createElement('canvas');
    lineCanvas.width = gridSize;
    lineCanvas.height = gridSize;
    lineCanvas.style.cssText='position:absolute;top:0;left:0;width:'+gridSize+'px;height:'+gridSize+'px;pointer-events:none;';
    container.appendChild(lineCanvas);
    ctx = lineCanvas.getContext('2d');

    for(var i=0;i<9;i++){
      var row=Math.floor(i/3);
      var col=i%3;
      var dot=document.createElement('div');
      var cx=col*dotSpacing+dotOffset;
      var cy=row*dotSpacing+dotOffset;
      dot.setAttribute('data-idx',i+1);
      dot.setAttribute('data-cx',cx);
      dot.setAttribute('data-cy',cy);
      dot.style.cssText='position:absolute;left:'+(cx-dotRadius)+'px;top:'+(cy-dotRadius)+'px;width:'+(dotRadius*2)+'px;height:'+(dotRadius*2)+'px;border-radius:50%;background:#232329;border:2px solid #3a3a42;transition:background 0.15s,border-color 0.15s,transform 0.15s;z-index:2;';
      container.appendChild(dot);
      dotElements.push(dot);
    }

    function getDotCenter(idx){
      var el=dotElements[idx-1];
      return {x:parseInt(el.getAttribute('data-cx')),y:parseInt(el.getAttribute('data-cy'))};
    }

    function activateDot(idx){
      var el=dotElements[idx-1];
      el.style.background='#6c5ce7';
      el.style.borderColor='#8b7cf0';
      el.style.transform='scale(1.25)';
    }

    function drawLines(tempX,tempY){
      ctx.clearRect(0,0,gridSize,gridSize);
      if(selectedDots.length===0)return;
      ctx.strokeStyle='#6c5ce7';
      ctx.lineWidth=3;
      ctx.lineCap='round';
      ctx.lineJoin='round';
      ctx.beginPath();
      var first=getDotCenter(selectedDots[0]);
      ctx.moveTo(first.x,first.y);
      for(var i=1;i<selectedDots.length;i++){
        var p=getDotCenter(selectedDots[i]);
        ctx.lineTo(p.x,p.y);
      }
      if(tempX!==undefined&&tempY!==undefined){
        ctx.lineTo(tempX,tempY);
      }
      ctx.stroke();
    }

    function resetPattern(){
      selectedDots=[];
      isDrawing=false;
      ctx.clearRect(0,0,gridSize,gridSize);
      for(var i=0;i<dotElements.length;i++){
        dotElements[i].style.background='#232329';
        dotElements[i].style.borderColor='#3a3a42';
        dotElements[i].style.transform='scale(1)';
      }
    }

    function flashError(){
      for(var i=0;i<dotElements.length;i++){
        dotElements[i].style.background='#ef4444';
        dotElements[i].style.borderColor='#f87171';
      }
      ctx.clearRect(0,0,gridSize,gridSize);
      if(selectedDots.length>0){
        ctx.strokeStyle='#ef4444';
        ctx.lineWidth=3;
        ctx.lineCap='round';
        ctx.beginPath();
        var first=getDotCenter(selectedDots[0]);
        ctx.moveTo(first.x,first.y);
        for(var i=1;i<selectedDots.length;i++){
          var p=getDotCenter(selectedDots[i]);
          ctx.lineTo(p.x,p.y);
        }
        ctx.stroke();
      }
      err.style.opacity='1';
      setTimeout(function(){
        err.style.opacity='0';
        resetPattern();
      },600);
    }

    function checkPattern(){
      var pattern=selectedDots.join('-');
      var hash=sha256(pattern);
      if(hash===ph){
        document.getElementById('lockOverlay').remove();
        document.querySelectorAll('[data-hidden]').forEach(function(el){el.style.display='';el.removeAttribute('data-hidden');});
      } else {
        flashError();
      }
    }

    function getRelPos(e){
      var rect=container.getBoundingClientRect();
      var clientX,clientY;
      if(e.touches&&e.touches.length>0){
        clientX=e.touches[0].clientX;
        clientY=e.touches[0].clientY;
      } else if(e.changedTouches&&e.changedTouches.length>0){
        clientX=e.changedTouches[0].clientX;
        clientY=e.changedTouches[0].clientY;
      } else {
        clientX=e.clientX;
        clientY=e.clientY;
      }
      return {x:clientX-rect.left,y:clientY-rect.top};
    }

    function hitTest(pos){
      var hitRadius=dotSpacing*0.45;
      for(var i=0;i<9;i++){
        var cx=parseInt(dotElements[i].getAttribute('data-cx'));
        var cy=parseInt(dotElements[i].getAttribute('data-cy'));
        var dx=pos.x-cx;
        var dy=pos.y-cy;
        if(Math.sqrt(dx*dx+dy*dy)<hitRadius){
          return i+1;
        }
      }
      return null;
    }

    function onStart(e){
      e.preventDefault();
      resetPattern();
      isDrawing=true;
      var pos=getRelPos(e);
      var hit=hitTest(pos);
      if(hit){
        selectedDots.push(hit);
        activateDot(hit);
        drawLines();
      }
    }

    function onMove(e){
      if(!isDrawing)return;
      e.preventDefault();
      var pos=getRelPos(e);
      var hit=hitTest(pos);
      if(hit&&selectedDots.indexOf(hit)===-1){
        selectedDots.push(hit);
        activateDot(hit);
      }
      drawLines(pos.x,pos.y);
    }

    function onEnd(e){
      if(!isDrawing)return;
      e.preventDefault();
      isDrawing=false;
      drawLines();
      if(selectedDots.length>=2){
        checkPattern();
      } else {
        resetPattern();
      }
    }

    container.addEventListener('mousedown',onStart);
    container.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onEnd);
    container.addEventListener('touchstart',onStart,{passive:false});
    container.addEventListener('touchmove',onMove,{passive:false});
    document.addEventListener('touchend',onEnd);
  });
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0b;
    --surface: #141417;
    --surface-hover: #1a1a1f;
    --border: #232329;
    --border-subtle: #1c1c22;
    --text: #ededef;
    --text-secondary: #8b8b92;
    --text-tertiary: #5c5c63;
    --accent: #6c5ce7;
    --active: #10b981;
    --active-bg: rgba(16, 185, 129, 0.1);
    --paused: #6b7280;
    --paused-bg: rgba(107, 114, 128, 0.1);
    --waiting: #f59e0b;
    --waiting-bg: rgba(245, 158, 11, 0.1);
    --closed: #ef4444;
    --closed-bg: rgba(239, 68, 68, 0.1);
    --alert: #f43f5e;
    --alert-bg: rgba(244, 63, 94, 0.08);
    --alert-border: rgba(244, 63, 94, 0.25);
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* Header */
  header {
    padding: 48px 0 0;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header-title {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .bolt {
    font-size: 24px;
    filter: saturate(1.2);
  }

  .project-count {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-tertiary);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
  }

  /* Search & Filters */
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .search-wrapper {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 360px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-tertiary);
    font-size: 14px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input::placeholder { color: var(--text-tertiary); }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
  }

  .filter-pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .pill {
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    user-select: none;
  }

  .pill:hover {
    border-color: var(--text-tertiary);
    color: var(--text);
  }

  .pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* Needs Attention Banner */
  .attention-banner {
    margin-top: 20px;
    background: var(--surface);
    border: 1px solid rgba(245, 158, 11, 0.25);
    border-left: 3px solid;
    border-image: linear-gradient(180deg, #f43f5e, #f59e0b) 1;
    border-radius: 0 var(--radius) var(--radius) 0;
    overflow: hidden;
  }

  .attention-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .attention-header:hover {
    background: var(--surface-hover);
  }

  .attention-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: #f59e0b;
  }

  .attention-chevron {
    font-size: 12px;
    color: var(--text-tertiary);
    transition: transform 0.2s;
  }

  .attention-chevron.collapsed {
    transform: rotate(-90deg);
  }

  .attention-body {
    padding: 0 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .attention-body.hidden {
    display: none;
  }

  .attention-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-secondary);
    padding: 3px 0;
  }

  .attention-item-icon {
    font-size: 11px;
    flex-shrink: 0;
    width: 16px;
    text-align: center;
  }

  .attention-item a {
    color: var(--text);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.15s;
  }

  .attention-item a:hover {
    color: var(--accent);
  }

  .attention-item .attention-reason {
    color: var(--text-tertiary);
    font-size: 11px;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1px;
    margin-top: 28px;
    background: var(--border-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  /* Card */
  .card {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: start;
    gap: 16px;
    padding: 18px 22px;
    background: var(--surface);
    transition: background 0.15s;
    cursor: default;
  }

  .card:hover { background: var(--surface-hover); }

  .card.has-alert {
    background: var(--alert-bg);
    border-left: 2px solid var(--alert);
    padding-left: 20px;
  }

  .card.has-alert:hover {
    background: rgba(244, 63, 94, 0.12);
  }

  .card-main {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .card-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.1px;
  }

  .status-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-active .status-dot { background: var(--active); }
  .status-active { color: var(--active); background: var(--active-bg); }

  .status-paused .status-dot { background: var(--paused); }
  .status-paused { color: var(--paused); background: var(--paused-bg); }

  .status-waiting .status-dot { background: var(--waiting); }
  .status-waiting { color: var(--waiting); background: var(--waiting-bg); }

  .status-closed .status-dot { background: var(--closed); }
  .status-closed { color: var(--closed); background: var(--closed-bg); }

  .card-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.55;
    margin-top: 2px;
  }

  /* People Tags */
  .people-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .person-chip {
    position: relative;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 600;
    color: #fff;
    cursor: default;
    flex-shrink: 0;
    letter-spacing: 0.3px;
  }

  .person-chip .person-tooltip {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #232329;
    color: var(--text);
    font-size: 11px;
    font-weight: 400;
    padding: 4px 8px;
    border-radius: 4px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
    border: 1px solid var(--border);
  }

  .person-chip:hover .person-tooltip {
    opacity: 1;
  }

  .person-overflow {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-tertiary);
    padding-left: 2px;
  }

  /* Upcoming Events */
  .events-section {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 6px;
  }

  .event-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    line-height: 1.5;
  }

  .event-icon {
    font-size: 11px;
    flex-shrink: 0;
  }

  .event-date {
    color: var(--accent);
    font-weight: 500;
    flex-shrink: 0;
  }

  .event-name {
    color: var(--text-secondary);
  }

  /* Key Links */
  .links-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .link-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    text-decoration: none;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .link-pill:hover {
    color: var(--text);
    border-color: var(--text-tertiary);
    background: var(--surface-hover);
  }

  .link-pill-icon {
    font-size: 10px;
  }

  .card-status-line {
    display: flex;
    align-items: center;

const statusPriority = { active: 1, waiting: 2, paused: 3, closed: 4 };

function sortProjects(list) {
  return [...list].sort((a, b) => {
    const aHas = a.alert ? 0 : 1;
    const bHas = b.alert ? 0 : 1;
    if (aHas !== bHas) return aHas - bHas;
    const aPri = statusPriority[a.status] || 5;
    const bPri = statusPriority[b.status] || 5;
    if (aPri !== bPri) return aPri - bPri;
    return a.name.localeCompare(b.name);
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Generate consistent color from name string
function nameColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;
  return 'hsl(' + hue + ', 45%, 42%)';
}

// Slug for card IDs
function slugify(name) {
  return 'card-' + name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '');
}

// Parse activity dates to actual Date objects for comparison (assumes current year context: 2026)
function parseActivityDate(dateStr) {
  // Format: "3/14" or "3/3"
  const parts = dateStr.split('/');
  if (parts.length === 2) {
    return new Date(2026, parseInt(parts[0]) - 1, parseInt(parts[1]));
  }
  return null;
}

// Get most recent activity date for a project
function getMostRecentActivityDate(p) {
  if (!p.recentActivity || p.recentActivity.length === 0) return null;
  let latest = null;
  for (const a of p.recentActivity) {
    const d = parseActivityDate(a.date);
    if (d && (!latest || d > latest)) latest = d;
  }
  return latest;
}

// Build attention items
function getAttentionItems() {
  const now = new Date();
  const items = [];

  for (const p of projects) {
    // Projects with alerts
    if (p.alert) {
      items.push({ name: p.name, reason: p.alert, icon: '⚠' });
    }

    // Waiting > 3 days
    if (p.status === 'waiting') {
      const updated = new Date(p.updated + 'T00:00:00');
      const daysDiff = Math.floor((now - updated) / (1000 * 60 * 60 * 24));
      if (daysDiff > 3) {
        items.push({ name: p.name, reason: 'Waiting for ' + daysDiff + ' days', icon: '⏳' });
      }
    }

    // No recent activity in 7 days
    const lastActivity = getMostRecentActivityDate(p);
    if (lastActivity) {
      const daysSince = Math.floor((now - lastActivity) / (1000 * 60 * 60 * 24));
      if (daysSince > 7) {
        items.push({ name: p.name, reason: 'No activity in ' + daysSince + ' days', icon: '💤' });
      }
    }
  }

  return items;
}

function renderAttentionBanner() {
  const container = document.getElementById('attention-container');
  const items = getAttentionItems();

  if (items.length === 0) {
    container.innerHTML = '';
    return;
  }

  let itemsHtml = '';
  for (const item of items) {
    const slug = slugify(item.name);
    itemsHtml += '<div class="attention-item">' +
      '<span class="attention-item-icon">' + item.icon + '</span>' +
      '<a href="#' + slug + '" onclick="scrollToCard(\'' + slug + '\');return false;">' + escapeHtml(item.name) + '</a>' +
      '<span class="attention-reason">— ' + escapeHtml(item.reason) + '</span>' +
    '</div>';
  }

  container.innerHTML = '<div class="attention-banner">' +
    '<div class="attention-header" onclick="toggleAttention()">' +
      '<div class="attention-header-left">🔔 Needs Attention <span style="font-weight:400;font-size:12px;color:var(--text-tertiary)">(' + items.length + ')</span></div>' +
      '<span class="attention-chevron" id="attention-chevron">▼</span>' +
    '</div>' +
    '<div class="attention-body" id="attention-body">' + itemsHtml + '</div>' +
  '</div>';
}

function toggleAttention() {
  const body = document.getElementById('attention-body');
  const chevron = document.getElementById('attention-chevron');
  if (body.classList.contains('hidden')) {
    body.classList.remove('hidden');
    chevron.classList.remove('collapsed');
  } else {
    body.classList.add('hidden');
    chevron.classList.add('collapsed');
  }
}

function scrollToCard(slug) {
  const el = document.getElementById(slug);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.style.boxShadow = '0 0 0 2px var(--accent)';
    setTimeout(() => { el.style.boxShadow = ''; }, 1500);
  }
}

function renderPeople(people) {
  if (!people || people.length === 0) return '';
  const maxShow = 5;
  const shown = people.slice(0, maxShow);
  const overflow = people.length - maxShow;

  let html = '<div class="people-row">';
  for (const p of shown) {
    const bg = nameColor(p.name);
    html += '<div class="person-chip" style="background:' + bg + '">' +
      p.initials +
      '<span class="person-tooltip">' + escapeHtml(p.name) + ' — ' + escapeHtml(p.role) + '</span>' +
    '</div>';
  }
  if (overflow > 0) {
    html += '<span class="person-overflow">+' + overflow + ' more</span>';
  }
  html += '</div>';
  return html;
}

function renderEvents(events) {
  if (!events || events.length === 0) return '';
  let html = '<div class="events-section">';
  for (const e of events) {
    html += '<div class="event-item">' +
      '<span class="event-icon">📅</span>' +
      '<span class="event-date">' + escapeHtml(e.date) + '</span>' +
      '<span class="event-name">' + escapeHtml(e.event) + '</span>' +
    '</div>';
  }
  html += '</div>';
  return html;
}

function renderLinks(links) {
  if (!links || links.length === 0) return '';
  let html = '<div class="links-row">';
  for (const l of links) {
    html += '<a class="link-pill" href="' + escapeHtml(l.url) + '" target="_blank" rel="noopener">' +
      '<span class="link-pill-icon">' + l.type + '</span>' +
      escapeHtml(l.label) +
    '</a>';
  }
  html += '</div>';
  return html;
}

function renderDecisions(decisions, cardIdx) {
  if (!decisions || decisions.length === 0) return '';
  const id = 'decisions-' + cardIdx;
  let listHtml = '';
  for (const d of decisions) {
    listHtml += '<div class="decision-item">' +
      '<span class="decision-date">' + escapeHtml(d.date) + '</span>' +
      '<span class="decision-text">' + escapeHtml(d.text) + '</span>' +
    '</div>';
  }
  return '<div class="decisions-section">' +
    '<button class="decisions-toggle" onclick="toggleDecisions(\'' + id + '\', this)">' +
      '<span class="decisions-chevron" id="chev-' + id + '">▶</span> Decisions (' + decisions.length + ')' +
    '</button>' +
    '<div class="decisions-list" id="' + id + '">' + listHtml + '</div>' +
  '</div>';
}

function toggleDecisions(id, btn) {
  const list = document.getElementById(id);
  const chev = document.getElementById('chev-' + id);
  if (list.classList.contains('open')) {
    list.classList.remove('open');
    chev.classList.remove('expanded');
  } else {
    list.classList.add('open');
    chev.classList.add('expanded');
  }
}

function renderCountdown(countdown) {
  if (!countdown) return '';
  const target = new Date(countdown.date + 'T00:00:00');
  const now = new Date();
  const diffMs = target - now;
  const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

  if (diffDays < 0) return '';

  let displayVal, colorClass;
  if (diffDays > 30) {
    colorClass = 'countdown-green';
  } else if (diffDays >= 14) {
    colorClass = 'countdown-amber';
  } else {
    colorClass = 'countdown-red';
  }

  if (diffDays > 60) {
    displayVal = Math.floor(diffDays / 7) + 'w';
  } else {
    displayVal = diffDays + 'd';
  }

  // Progress: assume 90-day total window for the bar
  const totalWindow = 90;
  const elapsed = totalWindow - Math.min(diffDays, totalWindow);
  const pct = Math.min(Math.round((elapsed / totalWindow) * 100), 100);

  const barColor = diffDays > 30 ? '#10b981' : (diffDays >= 14 ? '#f59e0b' : '#ef4444');

  return '<div class="countdown-badge">' +
    '<span class="countdown-label">' + escapeHtml(countdown.label) + '</span>' +
    '<span class="countdown-value ' + colorClass + '">' + displayVal + '</span>' +
    '<div class="countdown-bar"><div class="countdown-bar-fill" style="width:' + pct + '%;background:' + barColor + '"></div></div>' +
  '</div>';
}

function renderCard(p, i) {
  const hasAlert = p.alert ? 'has-alert' : '';
  const slug = slugify(p.name);
  const date = new Date(p.updated + 'T00:00:00');
  const formatted = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const alertHtml = p.alert
    ? '<div class="alert-badge"><span class="alert-icon">⚠</span> ' + escapeHtml(p.alert) + '</div>'
    : '';

  let statusLine = '';
  if (p.currentStatus) {
    statusLine = '<div class="card-status-line"><span class="card-status-dot"></span>' + escapeHtml(p.currentStatus) + '</div>';
  }

  let activityHtml = '';
  if (p.recentActivity && p.recentActivity.length > 0) {
    activityHtml = '<div class="card-activity">';
    for (const a of p.recentActivity) {
      activityHtml += '<div class="activity-item"><span class="activity-date">' + escapeHtml(a.date) + '</span><span class="activity-text">' + escapeHtml(a.text) + '</span></div>';
    }
    activityHtml += '</div>';
  }

  const peopleHtml = renderPeople(p.people);
  const eventsHtml = renderEvents(p.upcomingEvents);
  const linksHtml = renderLinks(p.links);
  const decisionsHtml = renderDecisions(p.decisions, i);
  const countdownHtml = renderCountdown(p.countdown);

  return '<div class="card ' + hasAlert + '" id="' + slug + '" style="animation-delay: ' + (i * 30) + 'ms">' +
    '<div class="card-main">' +
      '<div class="card-header">' +
        '<span class="card-name">' + escapeHtml(p.name) + '</span>' +
        '<span class="status-tag status-' + p.status + '"><span class="status-dot"></span>' + p.status + '</span>' +
      '</div>' +
      '<div class="card-desc">' + escapeHtml(p.desc) + '</div>' +
      peopleHtml +
      eventsHtml +
      linksHtml +
      statusLine +
      activityHtml +
      alertHtml +
      decisionsHtml +
    '</div>' +
    '<div class="card-meta">' +
      '<span class="card-date">' + formatted + '</span>' +
      countdownHtml +
    '</div>' +
  '</div>';
}

let currentFilter = 'all';
let searchQuery = '';

function render() {
  let filtered = projects;

  if (currentFilter !== 'all') {
    filtered = filtered.filter(p => p.status === currentFilter);
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.desc.toLowerCase().includes(q) ||
      p.status.toLowerCase().includes(q) ||
      (p.currentStatus && p.currentStatus.toLowerCase().includes(q)) ||
      (p.alert && p.alert.toLowerCase().includes(q)) ||
      (p.recentActivity && p.recentActivity.some(a => a.text.toLowerCase().includes(q))) ||
      (p.people && p.people.some(person => person.name.toLowerCase().includes(q) || person.role.toLowerCase().includes(q))) ||
      (p.upcomingEvents && p.upcomingEvents.some(e => e.event.toLowerCase().includes(q) || e.date.toLowerCase().includes(q)))
    );
  }

  const sorted = sortProjects(filtered);
  const grid = document.getElementById('grid');

  if (sorted.length === 0) {
    grid.innerHTML = '<div class="empty">No projects match your filters.</div>';
  } else {
    grid.innerHTML = sorted.map((p, i) => renderCard(p, i)).join('');
  }

  document.getElementById('count').textContent = sorted.length + ' of ' + projects.length + ' projects';
}

// Filters
document.getElementById('filters').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  currentFilter = pill.dataset.filter;
  render();
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

// Timestamp
const now = new Date();
document.getElementById('timestamp').textContent = now.toLocaleDateString('en-US', {
  weekday: 'short', month: 'short', day: 'numeric', year: 'numeric',
  hour: 'numeric', minute: '2-digit', hour12: true
});

// Initial render
renderAttentionBanner();
render();
</script>
